runtime: custom
env: flex

# Use the F1 instance class (free tier)
resources:
  cpu: 1
  memory_gb: 0.5
  disk_size_gb: 10

# Automatic scaling settings
automatic_scaling:
  min_num_instances: 1
  max_num_instances: 1  # Free tier limit
  cool_down_period_sec: 60
  cpu_utilization:
    target_utilization: 0.6

# Health check configuration
health_check:
  enable_health_check: True
  check_interval_sec: 30
  timeout_sec: 5
  unhealthy_threshold: 2
  healthy_threshold: 2

# Environment variables
env_variables:
  NODE_ENV: "production"
